<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>あなたの一杯診断 — Caravan Coffee</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Noto+Sans+JP:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #FAF6EF;
  --surface:   #FDFAF7;
  --surface-2: #F0EAE0;
  --border:    #DDD4C4;
  --text:      #2C1A0A;
  --text-sub:  #6B5540;
  --text-muted:#A09080;
  --brown:     #2C1A0A;
  --mid:       #7A4520;
  --gold:      #B5831A;
  --gold-lt:   #D4A84B;
  --gold-bg:   #F5EDD8;
  --sand:      #E8D9C0;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', -apple-system, "Hiragino Sans", sans-serif;
  overflow-x: hidden;
}

/* ─── SCREENS ─── */
.screen {
  display: none;
  min-height: 100vh;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2.5rem 1.5rem 4rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.screen.active { display: flex; }

/* ─── HAND-DRAWN TEXTURE (SVG bg) ─── */
.sketch-bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.06;
}

/* ─── TOP SCREEN ─── */
#screen-top { background: var(--bg); }

/* Animated grinder */
.anim-wrap {
  width: 160px; height: 180px;
  margin: 0 auto 1.75rem;
  position: relative;
}
.anim-wrap svg { width: 100%; height: 100%; overflow: visible; }

@keyframes beanFall1 {
  0%,10%  { transform: translateY(-50px) rotate(-10deg); opacity:0; }
  20%     { opacity:1; }
  80%     { opacity:1; }
  95%,100%{ transform: translateY(5px) rotate(20deg); opacity:0; }
}
@keyframes beanFall2 {
  0%,20%  { transform: translateY(-55px) rotate(15deg); opacity:0; }
  30%     { opacity:1; }
  85%     { opacity:1; }
  98%,100%{ transform: translateY(3px) rotate(-10deg); opacity:0; }
}
@keyframes powderOut {
  0%,60%  { opacity:0; transform: scaleX(0.1); }
  80%     { opacity:1; transform: scaleX(1.05); }
  100%    { opacity:0.9; transform: scaleX(1); }
}
@keyframes handleTurn {
  0%,100% { transform: rotate(0deg); }
  40%     { transform: rotate(20deg); }
  70%     { transform: rotate(-8deg); }
}
@keyframes steamUp {
  0%   { opacity:0; transform: translateY(0) scaleX(1); }
  30%  { opacity:0.7; }
  100% { opacity:0; transform: translateY(-24px) scaleX(1.4); }
}

.bean1 { animation: beanFall1 2.5s ease-in 0s infinite; }
.bean2 { animation: beanFall2 2.5s ease-in 0.4s infinite; }
.powder { animation: powderOut 2.5s ease-out 0.3s infinite; transform-origin: 80px 148px; }
.handle { animation: handleTurn 2.5s ease-in-out 0.1s infinite; transform-origin: 102px 106px; }
.steam1 { animation: steamUp 1.6s ease-out 2.1s infinite; }
.steam2 { animation: steamUp 1.6s ease-out 2.45s infinite; }

.top-eyebrow {
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--gold);
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 0.625rem;
}
.top-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 26px;
  font-weight: 800;
  color: var(--brown);
  line-height: 1.55;
  margin-bottom: 0.75rem;
}
.top-sub {
  font-size: 13px;
  color: var(--text-sub);
  line-height: 1.85;
  margin-bottom: 2.25rem;
  font-weight: 300;
  max-width: 270px;
}

/* Sketch-style start button */
.btn-start {
  position: relative;
  background: var(--brown);
  color: var(--gold-lt);
  border: none;
  border-radius: 100px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  font-weight: 500;
  padding: 0.9rem 2.5rem;
  cursor: pointer;
  letter-spacing: 0.1em;
  transition: transform 0.15s, opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-start::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 100px;
  border: 1.5px solid var(--gold);
  opacity: 0.4;
}
.btn-start:active { transform: scale(0.97); opacity: 0.88; }

/* ─── QUESTION SCREEN ─── */
#screen-q { background: var(--bg); justify-content: flex-start; padding-top: 3.5rem; }

.q-header { width: 100%; max-width: 360px; margin-bottom: 2.5rem; }
.q-progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 7px;
  letter-spacing: 0.05em;
}
.q-progress-track { height: 1.5px; background: var(--border); border-radius: 2px; }
.q-progress-fill  { height: 1.5px; background: var(--gold); border-radius: 2px; transition: width 0.45s ease; }

.q-eyebrow {
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--gold);
  font-weight: 500;
  margin-bottom: 0.75rem;
  text-transform: uppercase;
}
.q-text {
  font-family: 'Shippori Mincho', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--brown);
  line-height: 1.65;
  max-width: 310px;
  margin: 0 auto 2rem;
}

/* Left-right buttons */
.q-choices {
  width: 100%;
  max-width: 360px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.btn-choice {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 1.25rem 1rem;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  line-height: 1.65;
  text-align: center;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
  min-height: 110px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  position: relative;
}
.btn-choice-letter {
  font-family: 'Shippori Mincho', serif;
  font-size: 18px;
  font-weight: 800;
  color: var(--sand);
  line-height: 1;
  transition: color 0.15s;
}
.btn-choice-text { font-size: 12px; color: var(--text-sub); line-height: 1.6; }
.btn-choice:active {
  transform: scale(0.97);
  border-color: var(--gold);
  background: var(--gold-bg);
}
.btn-choice:active .btn-choice-letter { color: var(--gold); }

/* ─── RESULT SCREEN ─── */
#screen-result { background: var(--bg); justify-content: flex-start; padding-top: 3rem; padding-bottom: 5rem; }

.result-eyebrow {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--gold);
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 0.875rem;
}
.result-mood {
  font-family: 'Shippori Mincho', serif;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
  line-height: 1.75;
  max-width: 290px;
}
.result-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 23px;
  font-weight: 800;
  color: var(--brown);
  line-height: 1.5;
  max-width: 290px;
  margin: 0 auto 0.75rem;
  white-space: pre-line;
}
.result-desc {
  font-size: 12px;
  color: var(--text-sub);
  line-height: 1.9;
  max-width: 290px;
  margin: 0 auto 2rem;
  font-weight: 300;
}

/* Product card */
.product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 1.5rem 1.375rem 1.625rem;
  width: 100%;
  max-width: 340px;
  text-align: left;
  margin-bottom: 1.5rem;
  position: relative;
  overflow: hidden;
}

/* Sketch camel watermark inside card */
.card-watermark {
  position: absolute;
  bottom: -10px; right: -10px;
  width: 90px; opacity: 0.05;
  pointer-events: none;
}

.product-img {
  width: 100%;
  height: 150px;
  background: var(--surface-2);
  border-radius: 14px;
  margin-bottom: 1.125rem;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.product-img img { width:100%; height:100%; object-fit:cover; border-radius:14px; }
.product-img-ph { font-size:11px; color:var(--text-muted); letter-spacing:0.08em; }

.product-tag {
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--gold);
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 0.35rem;
}
.product-name {
  font-family: 'Shippori Mincho', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--brown);
  line-height: 1.5;
  margin-bottom: 0.3rem;
  white-space: pre-line;
}
.product-variants { font-size: 11px; color: var(--text-muted); margin-bottom: 0.875rem; }
.product-divider  { width: 32px; height: 1px; background: var(--border); margin-bottom: 0.875rem; }
.product-copy {
  font-family: 'Shippori Mincho', serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--mid);
  margin-bottom: 0.5rem;
  line-height: 1.55;
}
.product-detail { font-size: 12px; color: var(--text-sub); line-height: 1.85; }

.btn-retry {
  background: transparent;
  border: 1.5px solid var(--border);
  border-radius: 100px;
  color: var(--text-sub);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  padding: 0.75rem 2rem;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: border-color 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-retry:active { border-color: var(--gold); color: var(--gold); }

/* Animations */
@keyframes fadeInUp {
  from { opacity:0; transform: translateY(12px); }
  to   { opacity:1; transform: translateY(0); }
}
.fade-in   { animation: fadeInUp 0.4s ease both; }
.fade-in-2 { animation: fadeInUp 0.4s ease 0.08s both; }
.fade-in-3 { animation: fadeInUp 0.4s ease 0.16s both; }
</style>

  document.getElementById('q-bar').style.width     = `${n * 20}%`;
  document.getElementById('q-number').textContent  = `QUESTION 0${n}`;

  const qText = document.getElementById('q-text');
  qText.textContent = q.text;
  qText.classList.remove('fade-in');
  void qText.offsetWidth;
  qText.classList.add('fade-in');

  const choices = document.getElementById('q-choices');
  choices.innerHTML = '';

  ['a', 'b'].forEach((key, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn-choice fade-in';
    btn.style.animationDelay = `${i * 0.1}s`;
    btn.innerHTML = `
      <span class="btn-choice-letter">${key.toUpperCase()}</span>
      <span class="btn-choice-text">${key === 'a' ? q.a : q.b}</span>
    `;
    btn.addEventListener('click', () => answer(key));
    choices.appendChild(btn);
  });
}

function answer(key) {
  answers.push(key);
  current++;
  if (current < questions.length) {
    setTimeout(renderQuestion, 160);
  } else {
    setTimeout(showResult, 160);
  }
}

function showResult() {
  // Q3(index2)のBはwellness flag
  const wellnessFlag = answers[2] === 'b';
  const bCount = answers.filter(a => a === 'b').length;
  const score  = bCount; // 0〜5

  let cat;
  if (wellnessFlag)    cat = 'wellness';
  else if (score <= 1) cat = 'daily';
  else if (score <= 3) cat = 'select';
  else                 cat = 'discover';

  const r = results[cat];
  document.getElementById('result-mood').textContent  = r.mood;
  document.getElementById('result-title').textContent = r.title;
  document.getElementById('result-desc').textContent  = r.desc;
  document.getElementById('p-tag').textContent        = r.tag;
  document.getElementById('p-name').textContent       = r.name;
  document.getElementById('p-variants').textContent   = r.variants;
  document.getElementById('p-copy').textContent       = r.copy;
  document.getElementById('p-detail').textContent     = r.detail;

  const imgWrap = document.getElementById('product-img');
  imgWrap.innerHTML = r.img
    ? `<img src="${r.img}" alt="${r.name}">`
    : `<span class="product-img-ph">PHOTO</span>`;

  showScreen('screen-result');
}

function retry() { startQuiz(); }
</script>
</body>
